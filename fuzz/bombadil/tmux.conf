# Configuration used when fuzzing tmux with Bombadil (see README.md).
# Keeps the server isolated and its observable state predictable so the
# properties in specification.ts hold.

# A plain shell in every pane, independent of the user's login shell.
set -g default-shell /bin/sh

# Don't wait long after escape; random input contains many bare escapes.
set -s escape-time 20

# Only redraw the status line on state changes, not on a timer, so states
# settle quickly and reproduced runs behave the same.
set -g status-interval 0

# Messages must clear quickly so the status line recovers (statusLineRecovers
# in specification.ts).
set -g display-time 500

# Never touch the host clipboard.
set -g set-clipboard off

# Exit the server when the client goes away so runs don't leak servers.
set -g exit-unattached on

# Exercise the mouse input path with Click actions.
set -g mouse on

# Random input must not detach the client, suspend it, or rename the session:
# the specification asserts the "[bombadil]" status line always comes back.
unbind d
unbind C-z
unbind '$'
